name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.10"
          enable-cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install actionlint
        run: |
          mkdir -p "$RUNNER_TEMP/actionlint-bin"
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12 "$RUNNER_TEMP/actionlint-bin"
          echo "$RUNNER_TEMP/actionlint-bin" >> "$GITHUB_PATH"

      - name: Lint workflows
        run: just lint-workflows

      - name: Lint Rust
        run: just lint-rust

      - name: Lint Python
        run: just lint-pyth

  test-rust:
    name: Rust tests (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install protoc
        if: runner.os == 'Windows'
        uses: ./.github/actions/install-protoc-windows

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Run Rust tests
        run: just test-rust

  test-python:
    name: Python tests (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: test-rust
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: ubuntu-latest
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.10"

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Install protoc
        if: runner.os == 'Windows'
        uses: ./.github/actions/install-protoc-windows

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Run Python integration tests
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            just test
          else
            just test-no-docker
          fi
